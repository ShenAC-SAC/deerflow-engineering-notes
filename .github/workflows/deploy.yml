name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同时只跑一次部署,新 push 取消进行中的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v6

      # 源码锚点校验(check:refs)需要一份 deer-flow clone 来核对钉死的 SHA
      - name: Checkout deer-flow (for source-anchor check)
        uses: actions/checkout@v6
        with:
          repository: bytedance/deer-flow
          ref: d2cc991d55b05421885923c1791273daec270005
          path: deer-flow
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install
        working-directory: site
        run: pnpm install --frozen-lockfile

      # 一道闸跑全:内容守卫 + 源码锚点 + astro build
      - name: Check + build
        working-directory: site
        env:
          DEERFLOW_ROOT: ${{ github.workspace }}/deer-flow
        run: pnpm check

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
