<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DeerFlow Engineering Notes</title>
  <desc id="desc">A source-reading map from prompt to agent runtime.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF4E8"/>
      <stop offset="1" stop-color="#EFE1C7"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" stroke="#C8B99B" stroke-opacity=".42" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#6B5335" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#paper)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)" opacity=".55"/>
  <path d="M760 68 C850 20 1010 42 1128 124" stroke="#2C5A86" stroke-opacity=".16" stroke-width="34" stroke-linecap="round"/>
  <path d="M74 326 C204 256 360 254 486 314" stroke="#CE4326" stroke-opacity=".12" stroke-width="30" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="82" y="68" width="530" height="280" rx="18" fill="#FFF9EE" stroke="#D6C7AA"/>
    <path d="M82 128 H612" stroke="#D6C7AA"/>
    <circle cx="115" cy="99" r="8" fill="#CE4326"/>
    <circle cx="143" cy="99" r="8" fill="#E0B75B"/>
    <circle cx="171" cy="99" r="8" fill="#2C5A86"/>
    <text x="114" y="181" fill="#2C5A86" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="700">deerflow / source-reading</text>
    <text x="114" y="228" fill="#251F18" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700">Engineering Notes</text>
    <text x="116" y="270" fill="#635845" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="21">From a prompt to an agent run</text>
    <text x="116" y="304" fill="#83735B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">Gateway -> Graph Factory -> Tools -> Runtime</text>
  </g>

  <g transform="translate(690 80)">
    <path d="M72 72 H332" stroke="#2C5A86" stroke-width="4" stroke-linecap="round"/>
    <path d="M72 172 H332" stroke="#2C5A86" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 12"/>
    <path d="M72 272 H332" stroke="#2C5A86" stroke-width="4" stroke-linecap="round"/>

    <g>
      <rect x="0" y="38" width="142" height="68" rx="12" fill="#FFF9EE" stroke="#CE4326" stroke-width="3"/>
      <text x="26" y="79" fill="#251F18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="700">01 Gateway</text>
    </g>
    <g>
      <rect x="218" y="38" width="172" height="68" rx="12" fill="#FFF9EE" stroke="#2C5A86" stroke-width="3"/>
      <text x="242" y="79" fill="#251F18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="700">02 Graph</text>
    </g>
    <g>
      <rect x="72" y="138" width="172" height="68" rx="12" fill="#FFF9EE" stroke="#CE4326" stroke-width="3"/>
      <text x="102" y="179" fill="#251F18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="700">03 Tools</text>
    </g>
    <g>
      <rect x="288" y="238" width="172" height="68" rx="12" fill="#FFF9EE" stroke="#2C5A86" stroke-width="3"/>
      <text x="315" y="279" fill="#251F18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="700">08 Memory</text>
    </g>
  </g>
</svg>
